<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사랑복지센터 — 미리보기 (데스크톱 / 모바일)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #F5F1EB;
      --ink: #1F1B16;
      --ink-3: #6B6258;
      --line: #DDD5C7;
      --accent: #C96442;
      --accent-d: #A84F31;
      --surface: #FDFBF7;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Toolbar ===== */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 241, 235, 0.9);
      backdrop-filter: saturate(140%) blur(10px);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .tb-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.95rem; font-weight: 600; color: var(--ink);
    }
    .tb-title .dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.25);
    }
    .tb-title .dot::after {
      content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff;
    }
    .tb-title small { color: var(--ink-3); font-weight: 400; font-size: 0.8rem; }

    /* Segmented toggle */
    .seg {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
    }
    .seg button {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-3);
      background: transparent;
      border: none;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      transition: all 0.2s;
    }
    .seg button svg { width: 15px; height: 15px; }
    .seg button.active {
      background: var(--ink);
      color: var(--bg);
    }

    .tb-actions { display: flex; align-items: center; gap: 10px; }
    .tb-link {
      font-size: 0.83rem;
      color: var(--ink-3);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .tb-link:hover { color: var(--ink); border-color: var(--ink-3); }

    /* ===== Stage ===== */
    .stage {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 24px 48px;
      overflow: auto;
    }

    /* Desktop frame */
    .frame-wrap { width: 100%; display: flex; justify-content: center; transition: all 0.3s; }
    .frame-desktop {
      width: 100%;
      max-width: 1280px;
    }
    .frame-desktop .browser {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(60,45,25,0.12);
    }
    .browser-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 16px;
      background: #EFE9DF;
      border-bottom: 1px solid var(--line);
    }
    .browser-dots { display: flex; gap: 6px; }
    .browser-dots span { width: 11px; height: 11px; border-radius: 50%; }
    .browser-dots span:nth-child(1) { background: #E5896B; }
    .browser-dots span:nth-child(2) { background: #E3C06A; }
    .browser-dots span:nth-child(3) { background: #93B57E; }
    .browser-url {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--ink-3);
      text-align: center;
    }
    .frame-desktop iframe {
      width: 100%;
      height: 78vh;
      border: none;
      display: block;
      background: #FAF9F7;
    }

    /* Mobile (phone) frame */
    .frame-mobile {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .phone {
      width: 390px;
      height: 800px;
      background: #1F1B16;
      border-radius: 46px;
      padding: 12px;
      box-shadow: 0 18px 50px rgba(60,45,25,0.22);
      position: relative;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 22px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 26px;
      background: #1F1B16;
      border-radius: 0 0 16px 16px;
      z-index: 3;
    }
    .phone-screen {
      width: 100%; height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: #FAF9F7;
      position: relative;
    }
    .phone-screen iframe {
      width: 390px;
      height: 776px;
      border: none;
      display: block;
    }
    .phone-meta {
      font-size: 0.8rem;
      color: var(--ink-3);
      text-align: center;
    }
    .phone-meta strong { color: var(--ink); font-weight: 600; }

    /* State: mobile active */
    body.view-mobile .frame-desktop { display: none; }
    body.view-mobile .frame-mobile { display: flex; }

    @media (max-width: 560px) {
      .toolbar { padding: 10px 14px; }
      .tb-title small { display: none; }
      .stage { padding: 18px 8px 32px; }
      .phone { width: 330px; height: 700px; }
      .phone-screen iframe { width: 330px; height: 676px; }
      .seg button { padding: 8px 12px; }
    }
  </style>
</head>
<body class="view-desktop">

  <div class="toolbar">
    <div class="tb-title">
      <span class="dot"></span>
      사랑복지센터 <small>미리보기</small>
    </div>
    <div class="seg" role="tablist" aria-label="화면 보기 전환">
      <button id="btn-desktop" class="active" onclick="setView('desktop')" aria-pressed="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        데스크톱
      </button>
      <button id="btn-mobile" onclick="setView('mobile')" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>
        모바일
      </button>
    </div>
    <div class="tb-actions">
      <a class="tb-link" href="index.html" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>
        새 탭에서 열기
      </a>
    </div>
  </div>

  <div class="stage">
    <div class="frame-wrap">
      <!-- Desktop -->
      <div class="frame-desktop">
        <div class="browser">
          <div class="browser-bar">
            <div class="browser-dots"><span></span><span></span><span></span></div>
            <div class="browser-url">sarang-welfare.kr</div>
          </div>
          <iframe id="iframe-desktop" title="데스크톱 미리보기" loading="lazy"></iframe>
        </div>
      </div>
      <!-- Mobile -->
      <div class="frame-mobile">
        <div class="phone">
          <div class="phone-screen">
            <iframe id="iframe-mobile" title="모바일 미리보기" loading="lazy"></iframe>
          </div>
        </div>
        <div class="phone-meta"><strong>390 × 800</strong> · 모바일 실제 크기</div>
      </div>
    </div>
  </div>

  <script>
    const SRC_DESKTOP = 'index.html';
    const SRC_MOBILE = '사랑복지센터 모바일.html';
    const dFrame = document.getElementById('iframe-desktop');
    const mFrame = document.getElementById('iframe-mobile');

    function setView(view) {
      document.body.classList.toggle('view-mobile', view === 'mobile');
      document.body.classList.toggle('view-desktop', view === 'desktop');
      document.getElementById('btn-desktop').classList.toggle('active', view === 'desktop');
      document.getElementById('btn-mobile').classList.toggle('active', view === 'mobile');
      document.getElementById('btn-desktop').setAttribute('aria-pressed', view === 'desktop');
      document.getElementById('btn-mobile').setAttribute('aria-pressed', view === 'mobile');
      // Lazy-load the frame on first switch
      const f = view === 'mobile' ? mFrame : dFrame;
      if (!f.src) f.src = view === 'mobile' ? SRC_MOBILE : SRC_DESKTOP;
      try { localStorage.setItem('sarang_preview_view', view); } catch(e) {}
    }

    // Init: load desktop, restore last view
    dFrame.src = SRC_DESKTOP;
    let saved = 'mobile';
    try { saved = localStorage.getItem('sarang_preview_view') || 'mobile'; } catch(e) {}
    setView(saved);
  </script>
</body>
</html>
